<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:110vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

h2{text-align:center;margin-bottom:10px;font-weight:800}

.location{
text-align:center;
font-size:14px;
margin-bottom:10px;
color:#f4d03f;
}

.countdown-bar{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
padding:10px;
border-radius:15px;
text-align:center;
font-weight:700;
margin-bottom:15px;
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
cursor:pointer;
}

.custom-player{margin-top:15px}

.progress-container{
width:100%;
height:8px;
background:rgba(255,255,255,.3);
border-radius:20px;
cursor:pointer;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#f4d03f,#c9a227);
transition:.2s;
}

.time{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
opacity:.8;
}

/* سبحة */
.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.tasbeeh-count{
background:#c9a227;
color:#0a1f44;
padding:6px 18px;
border-radius:20px;
margin-bottom:12px;
font-weight:800;
}

.tasbeeh-btn{
width:110px;
height:110px;
border-radius:50%;
background:radial-gradient(circle at center,#f4d03f 30%,#c9a227 70%);
display:flex;
align-items:center;
justify-content:center;
font-size:58px;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,.6);
position:relative;
}

.tasbeeh-btn::before{
content:"";
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:12px dotted #f4d03f;
animation:rotate 15s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.tasbeeh-btn:active{
transform:scale(.92);
}
</style>
</head>

<body>

<!-- مواقيت الصلاة -->
<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div class="location" id="locationText">جاري تحديد الموقع...</div>
<div class="countdown-bar" id="countdownBar">...</div>
<div id="prayers"></div>
</div>

<!-- القرآن -->
<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.faresabbad">فارس عباد</option>
</select>

<select id="surahSelect"></select>

<button id="playBtn" onclick="togglePlay()">▶ تشغيل</button>

<div class="custom-player">
<div class="progress-container" onclick="seekAudio(event)">
<div class="progress" id="progressBar"></div>
</div>
<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<audio id="audioPlayer"></audio>
</div>

<!-- سبحة -->
<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" onclick="tasbeehClick()">📿</div>
</div>

<script>

/* ===== GPS ===== */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
reverseGeocode(lat,lon);
getPrayerTimes(lat,lon);
},
()=>{document.getElementById("locationText").innerText="يرجى تشغيل تحديد الموقع"},
{enableHighAccuracy:true}
);
}

function reverseGeocode(lat,lon){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(r=>r.json())
.then(d=>{
let city=d.address.city||d.address.town||d.address.village||"غير معروف";
document.getElementById("locationText").innerText=`موقعك: ${city}`;
});
}

/* ===== مواقيت ===== */
let countdownInterval;

function getPrayerTimes(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(r=>r.json())
.then(d=>{
let t=d.data.timings;

document.getElementById("prayers").innerHTML=`
<div class="prayer-time"><span>الفجر</span><span>${t.Fajr}</span></div>
<div class="prayer-time"><span>الظهر</span><span>${t.Dhuhr}</span></div>
<div class="prayer-time"><span>العصر</span><span>${t.Asr}</span></div>
<div class="prayer-time"><span>المغرب</span><span>${t.Maghrib}</span></div>
<div class="prayer-time"><span>العشاء</span><span>${t.Isha}</span></div>
`;

calculateNextPrayer(t);
});
}

function calculateNextPrayer(times){
if(countdownInterval) clearInterval(countdownInterval);

let prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
let now=new Date();
let next=null;

for(let p of prayers){
let [h,m]=times[p].split(":");
let pt=new Date();
pt.setHours(h,m,0);
if(pt>now){next=pt;break;}
}

if(!next){
let [h,m]=times["Fajr"].split(":");
next=new Date();
next.setDate(next.getDate()+1);
next.setHours(h,m,0);
}

countdownInterval=setInterval(()=>{
let diff=next-new Date();
if(diff<=0){
clearInterval(countdownInterval);
document.getElementById("countdownBar").innerText="حان وقت الصلاة 🕌";
return;
}
let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);
document.getElementById("countdownBar").innerText=`متبقي ${h}س ${m}د ${s}ث`;
},1000);
}

/* ===== قرآن ===== */
let currentSurah=1;
let audio=document.getElementById("audioPlayer");
let playBtn=document.getElementById("playBtn");
let surahSelect=document.getElementById("surahSelect");
let reciterSelect=document.getElementById("reciterSelect");

fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
d.data.forEach(x=>{
let o=document.createElement("option");
o.value=x.number;
o.textContent=x.name;
surahSelect.appendChild(o);
});
});

function loadSurah(){
let surah=surahSelect.value;
let reciter=reciterSelect.value;
audio.src=`https://cdn.islamic.network/quran/audio-surah/128/${reciter}/${surah}.mp3`;
audio.load();
currentSurah=parseInt(surah);
}

function togglePlay(){
if(audio.src===""){
loadSurah();
audio.play();
playBtn.innerText="⏸ إيقاف";
return;
}
if(audio.paused){
audio.play();
playBtn.innerText="⏸ إيقاف";
}else{
audio.pause();
playBtn.innerText="▶ تشغيل";
}
}

surahSelect.onchange=()=>{loadSurah();audio.play();playBtn.innerText="⏸ إيقاف";}
reciterSelect.onchange=()=>{loadSurah();audio.play();playBtn.innerText="⏸ إيقاف";}

audio.addEventListener("ended", function () {
if (currentSurah < 114) {
currentSurah++;
surahSelect.value = currentSurah;
loadSurah();
audio.play();
}
});

audio.ontimeupdate=function(){
if(!audio.duration)return;
let percent=(audio.currentTime/audio.duration)*100;
document.getElementById("progressBar").style.width=percent+"%";
document.getElementById("currentTime").innerText=formatTime(audio.currentTime);
document.getElementById("duration").innerText=formatTime(audio.duration);
}

function seekAudio(e){
let width=e.currentTarget.clientWidth;
let clickX=e.offsetX;
audio.currentTime=(clickX/width)*audio.duration;
}

function formatTime(sec){
if(isNaN(sec)) return "0:00";
let m=Math.floor(sec/60);
let s=Math.floor(sec%60);
if(s<10)s="0"+s;
return m+":"+s;
}

/* ===== سبحة ===== */
let tasbeehCounter=localStorage.getItem("tasbeeh")||0;
document.getElementById("tasbeehCount").innerText=tasbeehCounter;

function tasbeehClick(){
tasbeehCounter++;
localStorage.setItem("tasbeeh",tasbeehCounter);
document.getElementById("tasbeehCount").innerText=tasbeehCounter;
if(navigator.vibrate)navigator.vibrate(40);
}
/* ===== حفظ آخر تشغيل ===== */

document.addEventListener("DOMContentLoaded", function () {

const audio = document.getElementById("audioPlayer");
const surahSelect = document.getElementById("surahSelect");
const reciterSelect = document.getElementById("reciterSelect");

/* تحميل آخر اختيار */
if (localStorage.getItem("lastSurah")) {
surahSelect.value = localStorage.getItem("lastSurah");
}

if (localStorage.getItem("lastReciter")) {
reciterSelect.value = localStorage.getItem("lastReciter");
}

/* حفظ عند التغيير */
surahSelect.addEventListener("change", () => {
localStorage.setItem("lastSurah", surahSelect.value);
});

reciterSelect.addEventListener("change", () => {
localStorage.setItem("lastReciter", reciterSelect.value);
});

/* حفظ وقت التشغيل */
audio.addEventListener("timeupdate", () => {
localStorage.setItem("lastTime", audio.currentTime);
});

/* يرجع لنفس الدقيقة */
audio.addEventListener("loadedmetadata", () => {
if (localStorage.getItem("lastTime")) {
audio.currentTime = localStorage.getItem("lastTime");
}
});

});
  
/* ===== سماء حسب الوقت الحقيقي ===== */

const canvas = document.createElement("canvas");
canvas.style.position = "fixed";
canvas.style.top = "0";
canvas.style.left = "0";
canvas.style.width = "100%";
canvas.style.height = "100%";
canvas.style.zIndex = "-1";
canvas.style.pointerEvents = "none";
document.body.appendChild(canvas);

const ctx = canvas.getContext("2d");

let w, h;
let stars = [];

function resize(){
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* نجوم */
class Star{
constructor(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.size=Math.random()*1.5;
this.opacity=Math.random();
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${this.opacity})`;
ctx.fill();
}
}

for(let i=0;i<150;i++){ stars.push(new Star()); }

function getTimePhase(){
let hour = new Date().getHours();

/* ليل */
if(hour >= 19 || hour < 5) return "night";

/* فجر وشروق */
if(hour >=5 && hour <8) return "sunrise";

/* نهار */
if(hour >=8 && hour <17) return "day";

/* غروب */
return "sunset";
}

function drawSky(){

let phase = getTimePhase();

/* خلفيات متدرجة */
if(phase==="night"){
let grad = ctx.createLinearGradient(0,0,0,h);
grad.addColorStop(0,"#020111");
grad.addColorStop(1,"#0a1f44");
ctx.fillStyle = grad;
ctx.fillRect(0,0,w,h);

/* نجوم */
stars.forEach(s=>s.draw());

/* قمر */
ctx.beginPath();
ctx.arc(w-120,120,40,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,210,0.9)";
ctx.fill();

}

if(phase==="sunrise"){
let grad = ctx.createLinearGradient(0,0,0,h);
grad.addColorStop(0,"#ff9966");
grad.addColorStop(1,"#ff5e62");
ctx.fillStyle=grad;
ctx.fillRect(0,0,w,h);

/* شمس طالعة تدريجي */
let progress=(new Date().getMinutes()/60);
let sunY = h - (progress * h*0.6);
ctx.beginPath();
ctx.arc(w/2,sunY,50,0,Math.PI*2);
ctx.fillStyle="#ffd700";
ctx.fill();
}

if(phase==="day"){
let grad = ctx.createLinearGradient(0,0,0,h);
grad.addColorStop(0,"#4facfe");
grad.addColorStop(1,"#00f2fe");
ctx.fillStyle=grad;
ctx.fillRect(0,0,w,h);

/* شمس ثابتة */
ctx.beginPath();
ctx.arc(w-120,120,50,0,Math.PI*2);
ctx.fillStyle="#ffd700";
ctx.fill();
}

if(phase==="sunset"){
let grad = ctx.createLinearGradient(0,0,0,h);
grad.addColorStop(0,"#ff7e5f");
grad.addColorStop(1,"#2c3e50");
ctx.fillStyle=grad;
ctx.fillRect(0,0,w,h);

/* شمس بتنزل */
let progress=(new Date().getMinutes()/60);
let sunY = 120 + (progress * 200);
ctx.beginPath();
ctx.arc(w/2,sunY,45,0,Math.PI*2);
ctx.fillStyle="#ffae00";
ctx.fill();
}

}

function animate(){
drawSky();
requestAnimationFrame(animate);
}

animate();
  
</script>

</body>
</html>
