<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:110vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* الكروت */

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

h2{text-align:center;margin-bottom:10px;font-weight:800}

.location{
text-align:center;
font-size:14px;
margin-bottom:10px;
color:#f4d03f;
}

.countdown-bar{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
padding:10px;
border-radius:15px;
text-align:center;
font-weight:700;
margin-bottom:15px;
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
cursor:pointer;
}

audio{width:100%;margin-top:10px}

/* سبحة أول تصميم مع تكبير الإيموجي */

.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.tasbeeh-count{
background:#c9a227;
color:#0a1f44;
padding:6px 18px;
border-radius:20px;
margin-bottom:12px;
font-weight:800;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.tasbeeh-btn{
width:110px;
height:110px;
border-radius:50%;
background:radial-gradient(circle at center,#f4d03f 30%,#c9a227 70%);
position:relative;
display:flex;
align-items:center;
justify-content:center;
font-size:58px; /* الإيموجي مكبّر */
line-height:1;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,.6);
transition:.2s;
}

.tasbeeh-btn::before{
content:"";
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:12px dotted #f4d03f;
animation:rotate 15s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.tasbeeh-btn:active{
transform:scale(.92);
}

/* الفوتر */

.footer{
margin-top:60px;
font-size:14px;
opacity:.8;
}
</style>
</head>

<body>

<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div class="location" id="locationText">جاري تحديد الموقع...</div>
<div class="countdown-bar" id="countdownBar">...</div>
<div id="prayers"></div>
</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.faresabbad">فارس عباد</option>
<option value="ar.abdurrahmaansudais">عبد الرحمن السديس</option>
</select>

<select id="surahSelect"></select>

<button onclick="playSurah()">تشغيل السورة</button>

<audio id="audioPlayer" controls></audio>
</div>

<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" id="tasbeehBtn" onclick="tasbeehClick()">📿</div>
</div>

<div class="footer">
تم التصميم بواسطة Rhmany
</div>

<script>

/* GPS */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
reverseGeocode(lat,lon);
getPrayerTimes(lat,lon);
},
()=>{document.getElementById("locationText").innerText="فشل تحديد الموقع"},
{enableHighAccuracy:true}
);
}

/* اسم المدينة */
function reverseGeocode(lat,lon){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(r=>r.json())
.then(d=>{
let city=d.address.city||d.address.town||d.address.village;
document.getElementById("locationText").innerText=`موقعك: ${city}`;
});
}

/* مواقيت الصلاة */
let countdownInterval;

function getPrayerTimes(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(r=>r.json())
.then(d=>{
let t=d.data.timings;

document.getElementById("prayers").innerHTML=`
<div class="prayer-time"><span>الفجر</span><span>${t.Fajr}</span></div>
<div class="prayer-time"><span>الظهر</span><span>${t.Dhuhr}</span></div>
<div class="prayer-time"><span>العصر</span><span>${t.Asr}</span></div>
<div class="prayer-time"><span>المغرب</span><span>${t.Maghrib}</span></div>
<div class="prayer-time"><span>العشاء</span><span>${t.Isha}</span></div>
`;

calculateNextPrayer(t);
});
}

function calculateNextPrayer(times){
if(countdownInterval) clearInterval(countdownInterval);

let prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
let now=new Date();
let next=null;

for(let p of prayers){
let [h,m]=times[p].split(":");
let pt=new Date();
pt.setHours(h,m,0);
if(pt>now){next=pt;break;}
}

if(!next){
let [h,m]=times["Fajr"].split(":");
next=new Date();
next.setDate(next.getDate()+1);
next.setHours(h,m,0);
}

countdownInterval=setInterval(()=>{
let diff=next-new Date();
if(diff<=0){
clearInterval(countdownInterval);
document.getElementById("countdownBar").innerText="حان وقت الصلاة 🕌";
return;
}
let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("countdownBar").innerText=`متبقي ${h}س ${m}د ${s}ث`;
},1000);
}

/* تحميل السور */
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(d=>{
let s=document.getElementById("surahSelect");
d.data.forEach(x=>{
let o=document.createElement("option");
o.value=x.number;
o.textContent=x.name;
s.appendChild(o);
});
});

/* تشغيل السورة */
function playSurah(){
let surah=document.getElementById("surahSelect").value;
let reciter=document.getElementById("reciterSelect").value;
let audio=document.getElementById("audioPlayer");
audio.src=`https://cdn.islamic.network/quran/audio-surah/128/${reciter}/${surah}.mp3`;
audio.play();
}

/* السبحة بدون رقم محدد */
let tasbeehCounter=localStorage.getItem("tasbeeh")||0;
document.getElementById("tasbeehCount").innerText=tasbeehCounter;

function tasbeehClick(){
tasbeehCounter++;
localStorage.setItem("tasbeeh",tasbeehCounter);
document.getElementById("tasbeehCount").innerText=tasbeehCounter;
if(navigator.vibrate) navigator.vibrate(40);
}

</script>

</body>
</html>
