<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZKAR</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Amiri&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(160deg,#08172f,#102e63 40%,#c9a227 140%);
min-height:110vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.app-title{
font-size:28px;
font-weight:800;
margin-bottom:20px;
color:#f7d774;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(0,0,0,.5);
}

select{
font-family:'Amiri',serif;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#f7d774,#d4a514);
color:#08172f;
cursor:pointer;
}

/* سبحة */
.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.tasbeeh-count{
background:#d4a514;
color:#08172f;
padding:6px 18px;
border-radius:20px;
margin-bottom:12px;
font-weight:800;
}

.tasbeeh-btn{
width:105px;
height:105px;
border-radius:50%;
background:radial-gradient(circle at center,#f7d774 30%,#d4a514 80%);
display:flex;
align-items:center;
justify-content:center;
font-size:55px;
cursor:pointer;
box-shadow:0 12px 25px rgba(0,0,0,.6);
position:relative;
}

.tasbeeh-btn::before{
content:"";
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:10px dotted #f7d774;
animation:spin 15s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="app-title">AZKAR</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.faresabbad">فارس عباد</option>
<option value="ar.abdurrahmanalsudais">عبد الرحمن السديس</option>
</select>

<select id="surahSelect"></select>

<button onclick="playSurah()">▶ تشغيل</button>

<audio id="audioPlayer" controls style="width:100%;margin-top:10px;"></audio>
</div>

<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" onclick="tasbeehClick()">📿</div>
</div>

<script>

/* تحميل أسماء السور بالتشكيل */
let surahSelect=document.getElementById("surahSelect");

fetch("https://api.alquran.cloud/v1/surah")
.then(res=>res.json())
.then(data=>{
data.data.forEach(surah=>{
let option=document.createElement("option");
option.value=surah.number;
option.textContent=surah.name;
surahSelect.appendChild(option);
});
});

/* تشغيل السورة من API */
function playSurah(){
let surah=surahSelect.value;
let reciter=document.getElementById("reciterSelect").value;
let audio=document.getElementById("audioPlayer");

fetch(`https://api.alquran.cloud/v1/surah/${surah}/${reciter}`)
.then(res=>res.json())
.then(data=>{
audio.src=data.data.audio;
audio.play();
});
}

/* سبحة */
let tasbeehCounter=0;
function tasbeehClick(){
tasbeehCounter++;
document.getElementById("tasbeehCount").innerText=tasbeehCounter;
if(navigator.vibrate)navigator.vibrate(50);
}

</script>

</body>
</html>
