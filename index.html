<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:radial-gradient(circle at top,#1B263B,#0D1B2A);
color:white;
transition:.4s;
}
.container{max-width:520px;margin:auto;padding:20px}
.card{
background:linear-gradient(145deg,#1B263B,#16213E);
padding:25px;
border-radius:22px;
margin-bottom:25px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
border:1px solid rgba(255,215,0,.25);
}
h2{
margin-top:0;
font-weight:900;
background:linear-gradient(45deg,#FFD700,#D4AF37,#FFF8DC);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
button,select{
background:linear-gradient(45deg,#FFD700,#D4AF37);
color:#0D1B2A;
border:none;
padding:12px 18px;
border-radius:14px;
font-weight:800;
cursor:pointer;
}
.tasbeeh-btn{
width:100%;
padding:24px;
font-size:24px;
margin-top:10px;
border-radius:20px;
}
#tasbeehCount{
font-size:64px;
text-align:center;
margin:10px 0;
}
audio{width:100%;margin-top:10px}
.prayer-box{
padding:10px 0;
border-bottom:1px solid rgba(255,215,0,.2);
}
.next{
color:#FFD700;
font-weight:900;
}
.countdown{
color:#FFD700;
font-weight:700;
}
.toggle{
position:fixed;
top:15px;
left:15px;
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(45deg,#FFD700,#D4AF37);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
.dark{background:#f4f4f4;color:#111}
.dark .card{background:white;color:#111}
.progress{background:#333;border-radius:10px;overflow:hidden}
.progress div{
background:linear-gradient(45deg,#FFD700,#D4AF37);
height:12px;
}
</style>
</head>
<body>

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="container">

<!-- المسبحة -->
<div class="card">
<h2>📿 المسبحة</h2>
<div id="tasbeehCount">0</div>
<button class="tasbeeh-btn" onclick="tasbeeh()">تسبيح</button>
<button onclick="resetTasbeeh()">تصفير</button>
</div>

<!-- البث -->
<div class="card">
<h2>🔊 بث القرآن</h2>
<select id="sheikh" onchange="changeStream()">
<option value="https://server10.mp3quran.net/basit/128.mp3">عبدالباسط</option>
<option value="https://server7.mp3quran.net/minsh/128.mp3">المنشاوي</option>
<option value="https://server6.mp3quran.net/husary/128.mp3">الحصري</option>
<option value="https://server8.mp3quran.net/sds/128.mp3">السديس</option>
<option value="https://server12.mp3quran.net/ajm/128.mp3">العجمي</option>
<option value="https://server13.mp3quran.net/afasy/128.mp3">العفاسي</option>
</select>
<audio id="radio" controls></audio>
</div>

<!-- الختمة -->
<div class="card">
<h2>📖 عداد الختمة</h2>
<input type="number" id="pagesRead" placeholder="عدد الصفحات اليوم" style="width:100%;padding:10px;border-radius:10px;border:none;">
<br><br>
<button onclick="updateKhatma()">تحديث</button>
<p>التقدم: <span id="khatmaPercent">0</span>%</p>
<div class="progress"><div id="progressBar" style="width:0%"></div></div>
</div>

<!-- أوقات الصلاة -->
<div class="card">
<h2>📍 أوقات الصلاة</h2>
<div id="cityName">جاري تحديد الموقع...</div>
<div id="prayerTimes"></div>
</div>

</div>

<script>

/* الوضع الليلي */
function toggleDark(){document.body.classList.toggle("dark")}

/* المسبحة */
let count=localStorage.getItem("tasbeeh")||0;
tasbeehCount.innerText=count;
function tasbeeh(){
count++;
localStorage.setItem("tasbeeh",count);
tasbeehCount.innerText=count;
if(navigator.vibrate) navigator.vibrate(40);
}
function resetTasbeeh(){
count=0;
localStorage.setItem("tasbeeh",0);
tasbeehCount.innerText=0;
}

/* البث */
const radio=document.getElementById("radio");
function changeStream(){radio.src=sheikh.value}
changeStream();

/* الختمة */
let totalPages=604;
let pages=localStorage.getItem("pages")||0;
updateUI();
function updateKhatma(){
let today=parseInt(pagesRead.value)||0;
pages=parseInt(pages)+today;
if(pages>604) pages=604;
localStorage.setItem("pages",pages);
updateUI();
}
function updateUI(){
let percent=((pages/totalPages)*100).toFixed(1);
khatmaPercent.innerText=percent;
progressBar.style.width=percent+"%";
}

/* الصلاة */
function getPrayerTimes(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(res=>res.json())
.then(data=>{
let t=data.data.timings;
let city=data.data.meta.timezone.split('/')[1];
cityName.innerText="📍 "+city;

let prayers={
"الفجر":t.Fajr,
"الظهر":t.Dhuhr,
"العصر":t.Asr,
"المغرب":t.Maghrib,
"العشاء":t.Isha
};

displayPrayers(prayers);
startCountdown(prayers);
});
}

function displayPrayers(prayers){
let html="";
for(let name in prayers){
html+=`
<div class="prayer-box" id="box-${name}">
<strong>${name}</strong> - ${prayers[name]}
<span id="count-${name}" class="countdown"></span>
</div>
`;
}
prayerTimes.innerHTML=html;
}

function startCountdown(prayers){

function update(){
let now=new Date();
let nextPrayer=null;
let minDiff=Infinity;

for(let name in prayers){
let [h,m]=prayers[name].split(":");
let prayer=new Date();
prayer.setHours(h,m,0);
let diff=prayer-now;
if(diff<0) diff+=86400000;

if(diff<minDiff){
minDiff=diff;
nextPrayer=name;
}

let hours=Math.floor(diff/3600000);
let minutes=Math.floor((diff%3600000)/60000);
let seconds=Math.floor((diff%60000)/1000);

document.getElementById(`count-${name}`).innerText=
` - ⏳ ${hours}س ${minutes}د ${seconds}ث`;
}

document.querySelectorAll(".prayer-box").forEach(e=>e.classList.remove("next"));
if(nextPrayer){
document.getElementById(`box-${nextPrayer}`).classList.add("next");
}
}

update();
setInterval(update,1000);
}

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
getPrayerTimes(pos.coords.latitude,pos.coords.longitude);
});
}

</script>

</body>
</html>
