<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(160deg,#0b1220,#111c33);
color:white;
}
.container{max-width:520px;margin:auto;padding:20px}
.card{
background:linear-gradient(145deg,#14213d,#1f2f52);
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
border:1px solid rgba(255,215,0,.3);
}
h2{
margin:0 0 20px 0;
font-weight:900;
background:linear-gradient(45deg,#FFD700,#ffcc00,#fff4b0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
button,select,input{
background:linear-gradient(45deg,#FFD700,#D4AF37);
color:#111;
border:none;
padding:12px 18px;
border-radius:14px;
font-weight:800;
cursor:pointer;
}
select,input{width:100%}
audio{width:100%;margin-top:10px}
.tasbeeh-btn{width:100%;padding:24px;font-size:24px;margin-top:10px;border-radius:20px}
#tasbeehCount{font-size:64px;text-align:center;margin:15px 0}
.prayer-box{padding:10px 0;border-bottom:1px solid rgba(255,215,0,.2)}
.next{background:rgba(255,215,0,.15);border-radius:12px;padding:10px}
.countdown{color:#FFD700;font-weight:700}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>📿 المسبحة</h2>
<div id="tasbeehCount">0</div>
<button class="tasbeeh-btn" onclick="tasbeeh()">تسبيح</button>
<button onclick="resetTasbeeh()">تصفير</button>
</div>

<div class="card">
<h2>🔊 بث القرآن</h2>
<select onchange="changeStream(this.value)">
<option value="https://radio.mp3quran.net/abdulbasit_64kbps">عبدالباسط</option>
<option value="https://radio.mp3quran.net/minshawi_64kbps">المنشاوي</option>
<option value="https://radio.mp3quran.net/husary_64kbps">الحصري</option>
<option value="https://radio.mp3quran.net/afasy_64kbps">العفاسي</option>
</select>
<audio id="radio" controls preload="none"></audio>
</div>

<div class="card">
<h2>📍 أوقات الصلاة</h2>
<div id="cityName">جاري تحديد الموقع...</div>
<div id="prayerTimes"></div>
</div>

</div>

<script>

/* مسبحة */
let count=localStorage.getItem("tasbeeh")||0;
tasbeehCount.innerText=count;
function tasbeeh(){
count++;
localStorage.setItem("tasbeeh",count);
tasbeehCount.innerText=count;
}
function resetTasbeeh(){
count=0;
localStorage.setItem("tasbeeh",0);
tasbeehCount.innerText=0;
}

/* بث */
function changeStream(url){
const r=document.getElementById("radio");
r.src=url;
r.load();
}

/* Reverse Geocoding */
function getCityName(lat,lon){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(res=>res.json())
.then(data=>{
let city = data.address.city || data.address.town || data.address.state || "موقعك";
document.getElementById("cityName").innerText="📍 "+city;
});
}

/* مواقيت */
function getPrayerTimes(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(res=>res.json())
.then(data=>{
let t=data.data.timings;
let prayers={
"الفجر":t.Fajr,
"الظهر":t.Dhuhr,
"العصر":t.Asr,
"المغرب":t.Maghrib,
"العشاء":t.Isha
};
displayPrayers(prayers);
startCountdown(prayers);
});
}

function displayPrayers(prayers){
let html="";
for(let name in prayers){
html+=`
<div class="prayer-box" id="box-${name}">
<strong>${name}</strong> - ${prayers[name]}
<span id="count-${name}" class="countdown"></span>
</div>`;
}
prayerTimes.innerHTML=html;
}

function startCountdown(prayers){
function update(){
let now=new Date();
let next=null,min=Infinity;

for(let name in prayers){
let [h,m]=prayers[name].split(":");
let p=new Date();
p.setHours(h,m,0);
let diff=p-now;
if(diff<0) diff+=86400000;
if(diff<min){min=diff;next=name;}

let hh=Math.floor(diff/3600000);
let mm=Math.floor((diff%3600000)/60000);
let ss=Math.floor((diff%60000)/1000);

document.getElementById(`count-${name}`).innerText=
` - ⏳ ${hh}س ${mm}د ${ss}ث`;
}

document.querySelectorAll(".prayer-box").forEach(e=>e.classList.remove("next"));
if(next) document.getElementById(`box-${next}`).classList.add("next");
}
update();
setInterval(update,1000);
}

/* تشغيل الموقع */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
getCityName(lat,lon);
getPrayerTimes(lat,lon);
});
}

</script>

</body>
</html>
