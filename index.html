<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:100vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

h2{text-align:center;margin-bottom:10px;font-weight:800}

.location{
text-align:center;
font-size:14px;
margin-bottom:10px;
color:#f4d03f;
}

.countdown-bar{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
padding:10px;
border-radius:15px;
text-align:center;
font-weight:700;
margin-bottom:15px;
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
cursor:pointer;
}

audio{width:100%;margin-top:10px}

/* Tasbeeh */

.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.tasbeeh-count{
background:#c9a227;
color:#0a1f44;
padding:5px 14px;
border-radius:20px;
margin-bottom:10px;
font-weight:800;
}

.tasbeeh-btn{
width:95px;
height:95px;
border-radius:50%;
border:10px dotted #f4d03f;
background:#c9a227;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.5);
transition:.2s;
}

.tasbeeh-btn:active{
transform:scale(.9);
}
</style>
</head>

<body>

<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div class="location" id="locationText">جاري تحديد الموقع...</div>
<div class="countdown-bar" id="countdownBar">...</div>
<div id="prayers"></div>
</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.mahermuaiqly">ماهر المعيقلي</option>
<option value="ar.saoodshuraym">سعود الشريم</option>
<option value="ar.yasserdosari">ياسر الدوسري</option>
</select>

<select id="surahSelect"></select>

<button onclick="playSurah()">تشغيل السورة</button>

<audio id="audioPlayer" controls></audio>

</div>

<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" onclick="tasbeehClick()">📿</div>
</div>

<script>

/* تحديد موقع GPS */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
position=>{
let lat=position.coords.latitude;
let lon=position.coords.longitude;
reverseGeocode(lat,lon);
getPrayerTimes(lat,lon);
},
error=>{
document.getElementById("locationText").innerText="فشل تحديد الموقع";
},
{enableHighAccuracy:true}
);
}

/* اسم المدينة */
function reverseGeocode(lat,lon){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(res=>res.json())
.then(data=>{
let city=data.address.city || data.address.town || data.address.village;
document.getElementById("locationText").innerText=`موقعك: ${city}`;
});
}

/* مواقيت الصلاة */
let countdownInterval;

function getPrayerTimes(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(res=>res.json())
.then(data=>{
let t=data.data.timings;

document.getElementById("prayers").innerHTML=`
<div class="prayer-time"><span>الفجر</span><span>${t.Fajr}</span></div>
<div class="prayer-time"><span>الظهر</span><span>${t.Dhuhr}</span></div>
<div class="prayer-time"><span>العصر</span><span>${t.Asr}</span></div>
<div class="prayer-time"><span>المغرب</span><span>${t.Maghrib}</span></div>
<div class="prayer-time"><span>العشاء</span><span>${t.Isha}</span></div>
`;

calculateNextPrayer(t);
});
}

function calculateNextPrayer(times){
if(countdownInterval) clearInterval(countdownInterval);

let prayers=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
let now=new Date();
let nextTime=null;

for(let p of prayers){
let [h,m]=times[p].split(":");
let prayerTime=new Date();
prayerTime.setHours(h,m,0);
if(prayerTime>now){nextTime=prayerTime;break;}
}

if(!nextTime){
let [h,m]=times["Fajr"].split(":");
nextTime=new Date();
nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(h,m,0);
}

countdownInterval=setInterval(()=>{
let diff=nextTime-new Date();
if(diff<=0){
clearInterval(countdownInterval);
document.getElementById("countdownBar").innerText="حان وقت الصلاة 🕌";
return;
}

let h=Math.floor(diff/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);

document.getElementById("countdownBar").innerText=
`متبقي ${h}س ${m}د ${s}ث`;
},1000);
}

/* تحميل السور */
fetch("https://api.alquran.cloud/v1/surah")
.then(res=>res.json())
.then(data=>{
let select=document.getElementById("surahSelect");
data.data.forEach(s=>{
let option=document.createElement("option");
option.value=s.number;
option.textContent=s.name;
select.appendChild(option);
});
});

/* حفظ الشيخ */
let savedReciter=localStorage.getItem("reciter");
if(savedReciter){
document.getElementById("reciterSelect").value=savedReciter;
}

document.getElementById("reciterSelect").addEventListener("change",function(){
localStorage.setItem("reciter",this.value);
});

/* تشغيل السورة */
function playSurah(){
let surah=document.getElementById("surahSelect").value;
let reciter=document.getElementById("reciterSelect").value;
let audio=document.getElementById("audioPlayer");

audio.src=`https://cdn.islamic.network/quran/audio-surah/128/${reciter}/${surah}.mp3`;
audio.play();
}

/* السبحة */
let tasbeehCounter=localStorage.getItem("tasbeeh")||0;
document.getElementById("tasbeehCount").innerText=tasbeehCounter;

function tasbeehClick(){
tasbeehCounter++;
localStorage.setItem("tasbeeh",tasbeehCounter);
document.getElementById("tasbeehCount").innerText=tasbeehCounter;
if(navigator.vibrate) navigator.vibrate(40);
}

</script>

</body>
</html>
