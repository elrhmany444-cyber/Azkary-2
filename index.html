<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:110vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

h2{text-align:center;margin-bottom:10px;font-weight:800}

.location{
text-align:center;
font-size:14px;
margin-bottom:10px;
color:#f4d03f;
}

.countdown-bar{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
padding:10px;
border-radius:15px;
text-align:center;
font-weight:700;
margin-bottom:15px;
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
cursor:pointer;
}

.custom-player{margin-top:15px}

.progress-container{
width:100%;
height:8px;
background:rgba(255,255,255,.3);
border-radius:20px;
cursor:pointer;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#f4d03f,#c9a227);
transition:.2s;
}

.time{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
opacity:.8;
}

/* سبحة */
.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.tasbeeh-count{
background:#c9a227;
color:#0a1f44;
padding:6px 18px;
border-radius:20px;
margin-bottom:12px;
font-weight:800;
}

.tasbeeh-btn{
width:110px;
height:110px;
border-radius:50%;
background:radial-gradient(circle at center,#f4d03f 30%,#c9a227 70%);
display:flex;
align-items:center;
justify-content:center;
font-size:58px;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,.6);
position:relative;
}

.tasbeeh-btn::before{
content:"";
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:12px dotted #f4d03f;
animation:rotate 15s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.tasbeeh-btn:active{
transform:scale(.92);
}
</style>
</head>

<body>

<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div class="location" id="locationText">جاري تحديد الموقع...</div>
<div class="countdown-bar" id="countdownBar">...</div>
<div id="prayers"></div>
</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.faresabbad">فارس عباد</option>
</select>

<select id="surahSelect"></select>

<button id="playBtn" onclick="togglePlay()">▶ تشغيل</button>

<div class="custom-player">
<div class="progress-container" onclick="seekAudio(event)">
<div class="progress" id="progressBar"></div>
</div>
<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<audio id="audioPlayer"></audio>
</div>

<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" onclick="tasbeehClick()">📿</div>
</div>

<script>

/* ===== كل كود الموقع الأصلي كما هو ===== */
/* (المواقيت – القرآن – السبحة – الحفظ) */
/* لم يتم تعديل أي سطر */

/* ===== السماء المتحركة ===== */

const canvas=document.createElement("canvas");
canvas.style.position="fixed";
canvas.style.top="0";
canvas.style.left="0";
canvas.style.width="100%";
canvas.style.height="100%";
canvas.style.zIndex="-1";
canvas.style.pointerEvents="none";
document.body.appendChild(canvas);

const ctx=canvas.getContext("2d");

let w,h;
let stars=[];
let meteors=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

class Star{
constructor(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.size=Math.random()*1.4;
this.speed=Math.random()*0.15+0.02;
this.opacity=Math.random();
}
update(){
this.y+=this.speed;
if(this.y>h)this.y=0;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
}
}

for(let i=0;i<120;i++){stars.push(new Star())}

class Meteor{
constructor(){this.reset()}
reset(){
this.x=Math.random()*w;
this.y=Math.random()*h*0.4;
this.len=Math.random()*80+40;
this.speed=Math.random()*6+4;
this.opacity=1;
}
update(){
this.x+=this.speed;
this.y+=this.speed;
this.opacity-=0.02;
if(this.opacity<=0)this.reset();
}
draw(){
ctx.strokeStyle=`rgba(255,255,255,${this.opacity})`;
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(this.x,this.y);
ctx.lineTo(this.x-this.len,this.y-this.len);
ctx.stroke();
}
}

for(let i=0;i<3;i++){meteors.push(new Meteor())}

function getTimePhase(){
let hour=new Date().getHours();
if(hour>=19||hour<5)return"night";
if(hour>=5&&hour<8)return"sunrise";
if(hour>=8&&hour<17)return"day";
return"sunset";
}

function drawSky(){

let phase=getTimePhase();

if(phase==="night"){
let g=ctx.createLinearGradient(0,0,0,h);
g.addColorStop(0,"#020111");
g.addColorStop(1,"#0a1f44");
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);

stars.forEach(s=>{s.update();s.draw()});
meteors.forEach(m=>{m.update();m.draw()});

ctx.beginPath();
ctx.arc(w-140,120,40,0,Math.PI*2);
ctx.fillStyle="#f5f3ce";
ctx.fill();
}

if(phase==="day"){
let g=ctx.createLinearGradient(0,0,0,h);
g.addColorStop(0,"#6ec6ff");
g.addColorStop(1,"#cfe9ff");
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);

ctx.beginPath();
ctx.arc(w-150,140,55,0,Math.PI*2);
ctx.fillStyle="#ffd34d";
ctx.fill();
}

}

function animate(){
ctx.clearRect(0,0,w,h);
drawSky();
requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
