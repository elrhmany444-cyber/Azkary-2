<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكاري | Islamic App</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:100vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:400px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-bottom:15px;
font-weight:800;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

audio{
width:100%;
margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div id="prayers">جاري تحديد موقعك...</div>
</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>
<select id="surahSelect" style="width:100%;padding:10px;border-radius:10px;border:none;"></select>
<button onclick="playSurah()">تشغيل السورة</button>
<audio id="audioPlayer" controls></audio>
</div>

<script>

// ====== مواقيت الصلاة ======

function getPrayerTimes(lat, lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=5`)
.then(res=>res.json())
.then(data=>{
let t = data.data.timings;
document.getElementById("prayers").innerHTML=`
<div class="prayer-time"><span>الفجر</span><span>${t.Fajr}</span></div>
<div class="prayer-time"><span>الظهر</span><span>${t.Dhuhr}</span></div>
<div class="prayer-time"><span>العصر</span><span>${t.Asr}</span></div>
<div class="prayer-time"><span>المغرب</span><span>${t.Maghrib}</span></div>
<div class="prayer-time"><span>العشاء</span><span>${t.Isha}</span></div>
`;
});
}

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
pos=>{
getPrayerTimes(pos.coords.latitude,pos.coords.longitude);
},
()=>{
document.getElementById("prayers").innerHTML="فشل تحديد الموقع";
}
);
}else{
document.getElementById("prayers").innerHTML="المتصفح لا يدعم تحديد الموقع";
}


// ====== تحميل السور ======

fetch("https://api.alquran.cloud/v1/surah")
.then(res=>res.json())
.then(data=>{
let select = document.getElementById("surahSelect");
data.data.forEach(surah=>{
let option=document.createElement("option");
option.value=surah.number;
option.textContent=surah.name;
select.appendChild(option);
});
});

function playSurah(){
let surahNumber=document.getElementById("surahSelect").value;
let audio=document.getElementById("audioPlayer");

audio.src=`https://everyayah.com/data/Alafasy_128kbps/${String(surahNumber).padStart(3,'0')}001.mp3`;
audio.play();
}

</script>

</body>
</html>
