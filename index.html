<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azkar App</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:linear-gradient(135deg,#0a1f44,#c9a227);
min-height:115vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
overflow-x:hidden;
}

/* اسم التطبيق فوق */
.app-title{
font-size:26px;
font-weight:800;
margin-bottom:15px;
letter-spacing:2px;
color:#f4d03f;
}

/* اسمك في الخلفية */
.brand-bg{
position:fixed;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
font-weight:900;
font-family:'Montserrat',sans-serif;
color:rgba(255,105,180,0.08);
letter-spacing:8px;
z-index:0;
pointer-events:none;
}

/* الكروت */
.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
position:relative;
z-index:2;
}

h2{text-align:center;margin-bottom:10px;font-weight:800}

.location{
text-align:center;
font-size:14px;
margin-bottom:10px;
color:#f4d03f;
}

.countdown-bar{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
padding:10px;
border-radius:15px;
text-align:center;
font-weight:700;
margin-bottom:15px;
}

.prayer-time{
display:flex;
justify-content:space-between;
margin:8px 0;
font-weight:600;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
}

button{
background:linear-gradient(45deg,#c9a227,#f4d03f);
color:#0a1f44;
cursor:pointer;
}

/* مشغل */
.custom-player{margin-top:15px}

.progress-container{
width:100%;
height:8px;
background:rgba(255,255,255,.3);
border-radius:20px;
cursor:pointer;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#f4d03f,#c9a227);
transition:.2s;
}

.time{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:6px;
opacity:.8;
}

/* سبحة */
.tasbeeh-wrapper{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
z-index:3;
}

.tasbeeh-count{
background:#c9a227;
color:#0a1f44;
padding:6px 18px;
border-radius:20px;
margin-bottom:12px;
font-weight:800;
}

.tasbeeh-btn{
width:115px;
height:115px;
border-radius:50%;
background:radial-gradient(circle at center,#f4d03f 30%,#c9a227 70%);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,.6);
position:relative;
transition:.2s;
}

.tasbeeh-btn::before{
content:"";
position:absolute;
width:135px;
height:135px;
border-radius:50%;
border:12px dotted #f4d03f;
animation:rotate 15s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.tasbeeh-btn:active{
transform:scale(.9);
}
</style>
</head>

<body>

<div class="brand-bg">Rhmany</div>

<div class="app-title">AZKAR</div>

<div class="card">
<h2>🕌 مواقيت الصلاة</h2>
<div class="location" id="locationText">جاري تحديد الموقع...</div>
<div class="countdown-bar" id="countdownBar">...</div>
<div id="prayers"></div>
</div>

<div class="card">
<h2>📖 القرآن الكريم</h2>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.abdulbasitmurattal">عبدالباسط عبدالصمد</option>
<option value="ar.faresabbad">فارس عباد</option>
<option value="ar.abdurrahmanalsudais">عبد الرحمن السديس</option>
</select>

<select id="surahSelect"></select>

<button id="playBtn" onclick="togglePlay()">▶ تشغيل</button>

<div class="custom-player">
<div class="progress-container" onclick="seekAudio(event)">
<div class="progress" id="progressBar"></div>
</div>
<div class="time">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<audio id="audioPlayer"></audio>
</div>

<div class="tasbeeh-wrapper">
<div class="tasbeeh-count" id="tasbeehCount">0</div>
<div class="tasbeeh-btn" onclick="tasbeehClick()">📿</div>
</div>

<script>

/* اهتزاز أقوى للسبحة */
function tasbeehClick(){
tasbeehCounter++;
localStorage.setItem("tasbeeh",tasbeehCounter);
document.getElementById("tasbeehCount").innerText=tasbeehCounter;
if(navigator.vibrate) navigator.vibrate([60,40,60]);
}

let tasbeehCounter=localStorage.getItem("tasbeeh")||0;
document.getElementById("tasbeehCount").innerText=tasbeehCounter;

/* باقي السكربت زي النسخة السابقة بدون تغيير في المنطق */

</script>

</body>
</html>
